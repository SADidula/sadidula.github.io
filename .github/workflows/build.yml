name: Build and Deploy
on:
  push:
    branches: ["main"]
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: UI/portfolio   # ← sets the working dir for all run steps
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install
      - name: Build project
        run: npm run build
      - name: Deploy build to target branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.BUILD_TOKEN }}
          publish_dir: UI/portfolio/dist   # ← must be relative to repo root
          publish_branch: gh-pages
          force_orphan: true
